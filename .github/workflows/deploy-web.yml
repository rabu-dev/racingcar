name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Export Godot Web
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_export_templates.tpz"
          relative_project_path: "./"
          cache: true

      - name: Prepare GitHub Pages
        run: |
          # godot-export exporta a: ~/godot_export_builds/<PresetName>/
          EXPORT_DIR="$HOME/godot_export_builds/Web"

          echo "=== Archivos exportados ==="
          ls -la "$EXPORT_DIR" || echo "Directorio no encontrado, buscando..."
          find "$HOME/godot_export_builds" -type f 2>/dev/null || true

          mkdir -p build

          # Copiar todos los archivos exportados a build/
          cp -r "$EXPORT_DIR"/. build/ 2>/dev/null || find "$HOME/godot_export_builds" -type f -exec cp {} build/ \;

          # Renombrar el HTML principal a index.html
          if [ ! -f build/index.html ]; then
            HTML_FILE=$(find build/ -maxdepth 1 -name "*.html" | head -1)
            if [ -n "$HTML_FILE" ]; then
              mv "$HTML_FILE" build/index.html
              echo "Renombrado $HTML_FILE -> build/index.html"
            fi
          fi

          # .nojekyll es CRÍTICO: sin él, GitHub Pages ignora archivos .pck y .wasm
          touch build/.nojekyll

          echo "=== Archivos en build/ ==="
          ls -la build/

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: export-web

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4