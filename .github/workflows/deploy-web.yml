name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      # Usar Godot NO-mono: el C# del proyecto es solo de plugins de editor (MCP, road-generator).
      # Godot 4 Mono no puede exportar a Web. El juego en sí usa GDScript.
      - name: Download Godot 4.7 (non-mono)
        run: |
          mkdir -p $HOME/godot
          wget -nv "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_linux.x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d $HOME/godot
          chmod +x "$HOME/godot/Godot_v4.7-stable_linux.x86_64"
          $HOME/godot/Godot_v4.7-stable_linux.x86_64 --version

      - name: Install Export Templates (non-mono)
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable
          wget -nv "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_export_templates.tpz" \
            -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          cp /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.7.stable/
          echo "=== Templates instalados ==="
          ls ~/.local/share/godot/export_templates/4.7.stable/ | grep web || ls ~/.local/share/godot/export_templates/4.7.stable/

      - name: Export Web
        run: |
          GODOT="$HOME/godot/Godot_v4.7-stable_linux.x86_64"
          mkdir -p build

          # Importar assets primero
          $GODOT --headless --path . --import 2>&1 || true

          # Exportar solo el preset "Web"
          $GODOT --headless --path . --export-release "Web" "$(pwd)/build/index.html" 2>&1

          echo "=== Archivos exportados ==="
          ls -la build/

      - name: Create .nojekyll
        run: touch build/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4