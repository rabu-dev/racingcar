name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Export Godot Web
        uses: firebelley/godot-export@v7.0.0
        with:
          godotVersion: "4.7-stable"
          exportPreset: "Web"

      - name: Prepare GitHub Pages
        run: |
          mkdir pages

          cp exports/Web/* pages/

          if [ -f pages/*.html ]; then
            mv pages/*.html pages/index.html
          fi

          touch pages/.nojekyll

          ls -la pages

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: pages

  deploy:
    needs: export-web

    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - id: deployment
        uses: actions/deploy-pages@v4