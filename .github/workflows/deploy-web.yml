name: Deploy Godot Web to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-web:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Download Godot 4.7 Mono
        run: |
          mkdir -p $HOME/godot
          wget -nv "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_linux_x86_64.zip" \
            -O /tmp/godot.zip
          unzip -q /tmp/godot.zip -d $HOME/godot
          chmod +x "$HOME/godot/Godot_v4.7-stable_mono_linux_x86_64/Godot_v4.7-stable_mono_linux.x86_64"
          ln -s "$HOME/godot/Godot_v4.7-stable_mono_linux_x86_64/Godot_v4.7-stable_mono_linux.x86_64" $HOME/godot/godot
          $HOME/godot/godot --version

      - name: Install Export Templates
        run: |
          mkdir -p ~/.local/share/godot/export_templates/4.7.stable.mono
          wget -nv "https://github.com/godotengine/godot-builds/releases/download/4.7-stable/Godot_v4.7-stable_mono_export_templates.tpz" \
            -O /tmp/templates.tpz
          unzip -q /tmp/templates.tpz -d /tmp/templates
          echo "=== Estructura del tpz ==="
          ls /tmp/templates/
          ls /tmp/templates/templates/ || true
          cp /tmp/templates/templates/* ~/.local/share/godot/export_templates/4.7.stable.mono/
          echo "=== Templates instalados ==="
          ls ~/.local/share/godot/export_templates/4.7.stable.mono/


      - name: Export Web
        run: |
          mkdir -p build
          # Primer run: importar assets (necesario para proyectos C#)
          $HOME/godot/godot --headless --path . --import 2>&1 || true
          # Exportar solo el preset "Web"
          $HOME/godot/godot --headless --path . --export-release "Web" "$(pwd)/build/index.html" 2>&1
          echo "=== Archivos exportados ==="
          ls -la build/

      - name: Create .nojekyll
        run: touch build/.nojekyll

      - name: Upload Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    needs: export-web
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4